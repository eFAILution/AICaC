# yaml-language-server: $schema=https://raw.githubusercontent.com/huntridge-labs/argus/0.7.0/argus-config.schema.json
# Argus Security Scanner Configuration
# Docs: https://huntridge-labs.github.io/argus/
# Generated by: argus init

version: "1.0"

scanners:
  # Secret detection — always recommended
  gitleaks:
    enabled: true

  # Detected: Python files found (validation/scripts/performance_measurement.py)
  bandit:
    enabled: true
    path: "."

  # Detected: dependency manifests found (package-lock.json)
  osv:
    enabled: true

  # Multi-language pattern-based SAST
  opengrep:
    enabled: true
    path: "."

  # Detected: GitHub Actions workflows (.github/workflows/release.yml)
  supply-chain:
    enabled: true

  # trivy-iac:
  #   enabled: true  # Enable for Terraform/Kubernetes
  #   path: "infrastructure"

  # checkov:
  #   enabled: true  # Enable for infrastructure policy checks
  #   path: "infrastructure"

  # container:
  #   enabled: true  # Enable for Docker image scanning
  #   image_ref: "myapp:latest"

  # zap:
  #   enabled: true  # Enable for web application DAST
  #   target_url: "http://localhost:3000"

  # clamav:
  #   enabled: true  # Enable for malware scanning
  #   path: "."

  # ── Linters ──

  lint-python:
    enabled: true

  lint-javascript:
    enabled: true

  lint-yaml:
    enabled: true

  # lint-json:
  #   enabled: true

# Detected tool configs (referenced automatically by scanners):
#   .gitleaks.toml (gitleaks-config)

reporting:
  formats:
    - terminal
    - sarif
  severity_threshold: high
  output_dir: "./argus-results"

execution:
  backend: auto
  pull_policy: if-not-present
