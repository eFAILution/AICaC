name: AICaC Adoption

on:
  push:
    branches:
      - main
      - master
  pull_request:
    branches:
      - main
      - master
  workflow_dispatch:  # Allow manual triggering

jobs:
  test:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install pyyaml pytest pytest-cov tiktoken yamllint
          pip install git+https://github.com/toon-format/toon-python.git

      - name: Lint YAML files
        run: yamllint -d "{extends: relaxed, rules: {line-length: {max: 150}}}" .ai/ validation/examples/sample-project/.ai/

      - name: Run action tests
        run: pytest .github/actions/aicac-adoption/tests/ -v --no-header -o "addopts="

      - name: Run validation tests
        run: pytest validation/scripts/tests/ -v --no-header -o "addopts="

  integration:
    name: Action Integration Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install pyyaml
          pip install git+https://github.com/toon-format/toon-python.git

      # Test 1: validate.py passes on sample project (common_commands accepted)
      - name: 'Integration: validate sample project'
        run: |
          OUTPUT=$(python .github/actions/aicac-adoption/scripts/validate.py validation/examples/sample-project)
          echo "$OUTPUT"
          echo "$OUTPUT" | grep -q "Compliance Level: Comprehensive"

      # Test 2: validate.py passes on a well-formed project
      - name: 'Integration: validate passes valid project'
        run: |
          # Bootstrap a project that passes all validation checks
          mkdir -p /tmp/valid-project
          echo '{"name": "valid-app"}' > /tmp/valid-project/package.json
          python .github/actions/aicac-adoption/scripts/bootstrap.py /tmp/valid-project

          OUTPUT=$(python .github/actions/aicac-adoption/scripts/validate.py /tmp/valid-project)
          echo "$OUTPUT"
          echo "$OUTPUT" | grep -q "Compliance Level: Minimal"

      # Test 3: generate_toon.py converts all YAML files
      - name: 'Integration: generate TOON files'
        run: |
          python .github/actions/aicac-adoption/scripts/generate_toon.py validation/examples/sample-project
          for yaml in validation/examples/sample-project/.ai/*.yaml; do
            toon="${yaml%.yaml}.toon"
            if [ ! -f "$toon" ]; then
              echo "FAIL: Expected $toon to exist"
              exit 1
            fi
            echo "OK: $toon exists"
          done

      # Test 4: generate_toon.py is idempotent
      - name: 'Integration: TOON generation is idempotent'
        run: |
          OUTPUT=$(python .github/actions/aicac-adoption/scripts/generate_toon.py validation/examples/sample-project)
          echo "$OUTPUT"
          echo "$OUTPUT" | grep -q "Generated: 0"

      # Test 5: toon_migration.py detects migration need correctly
      - name: 'Integration: migration detection'
        run: |
          python .github/actions/aicac-adoption/scripts/generate_toon.py validation/examples/sample-project --clean

          # Should need migration (has YAML, no TOON)
          python .github/actions/aicac-adoption/scripts/toon_migration.py validation/examples/sample-project --needs-migration
          echo "OK: needs-migration=true for YAML-only project"

          # Generate TOON files
          python .github/actions/aicac-adoption/scripts/generate_toon.py validation/examples/sample-project

          # Should NOT need migration (has both YAML and TOON)
          if python .github/actions/aicac-adoption/scripts/toon_migration.py validation/examples/sample-project --needs-migration; then
            echo "FAIL: needs-migration should be false after TOON generation"
            exit 1
          fi
          echo "OK: needs-migration=false for migrated project"

      # Test 6: issue body contains real savings data
      - name: 'Integration: migration issue body'
        run: |
          python .github/actions/aicac-adoption/scripts/generate_toon.py validation/examples/sample-project --clean
          BODY=$(python .github/actions/aicac-adoption/scripts/toon_migration.py validation/examples/sample-project --issue-body)
          echo "$BODY"

          echo "$BODY" | grep -q "context.yaml"
          echo "$BODY" | grep -q "architecture.yaml"
          echo "$BODY" | grep -q "Reduction"
          echo "$BODY" | grep -q "\- \[ \] Migrate"
          echo "OK: issue body contains savings table and checkbox"

      # Test 7: check-approval detects checkbox state
      - name: 'Integration: checkbox approval detection'
        run: |
          CHECKED='- [x] Migrate my `.ai/` directory to include TOON files'
          UNCHECKED='- [ ] Migrate my `.ai/` directory to include TOON files'

          python .github/actions/aicac-adoption/scripts/toon_migration.py . --check-approval "$CHECKED"
          echo "OK: checked box detected as approved"

          if python .github/actions/aicac-adoption/scripts/toon_migration.py . --check-approval "$UNCHECKED"; then
            echo "FAIL: unchecked box should not be approved"
            exit 1
          fi
          echo "OK: unchecked box detected as not approved"

      # Test 8: update_badge.py works
      - name: 'Integration: badge update'
        run: |
          python .github/actions/aicac-adoption/scripts/update_badge.py Comprehensive \
            --project-path=validation/examples/sample-project
          grep -q "AICaC-Comprehensive" validation/examples/sample-project/README.md
          echo "OK: badge updated to Comprehensive"

      # Test 9: bootstrap.py creates .ai/ structure
      - name: 'Integration: bootstrap new project'
        run: |
          mkdir -p /tmp/test-project
          echo '{"name": "test-app"}' > /tmp/test-project/package.json
          python .github/actions/aicac-adoption/scripts/bootstrap.py /tmp/test-project
          test -f /tmp/test-project/.ai/context.yaml
          test -f /tmp/test-project/.ai/README.md
          echo "OK: bootstrap created .ai/ structure"

      # Cleanup generated files
      - name: Cleanup
        if: always()
        run: |
          python .github/actions/aicac-adoption/scripts/generate_toon.py validation/examples/sample-project --clean 2>/dev/null || true
          git checkout -- validation/examples/sample-project/README.md 2>/dev/null || true

  aicac:
    name: AICaC Action
    runs-on: ubuntu-latest
    permissions:
      contents: write        # Needed to commit badge updates and push branches
      pull-requests: write   # Needed to create PRs
      issues: write          # Needed to create/read migration issues

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Check if .ai directory exists
        id: check-aicac
        run: |
          if [ -d ".ai" ]; then
            echo "mode=maintain" >> $GITHUB_OUTPUT
            echo "📁 .ai/ directory found - running in maintain mode"
          else
            echo "mode=setup" >> $GITHUB_OUTPUT
            echo "🚀 .ai/ directory not found - running in setup mode"
          fi

      - name: Run AICaC Action
        uses: ./.github/actions/aicac-adoption
        with:
          mode: ${{ steps.check-aicac.outputs.mode }}
          github-token: ${{ secrets.GITHUB_TOKEN }}
          update-badge: 'true'
