name: 'AICaC Adoption & Maintenance'
description: >-
  Bootstrap AICaC adoption with PR creation and maintain compliance with automatic badge updates.
  Required workflow permissions: contents:write, pull-requests:write, issues:write (if suggest-toon enabled).
branding:
  icon: 'cpu'
  color: 'blue'

inputs:
  mode:
    description: 'Operation mode: "setup" to bootstrap AICaC, "maintain" to validate and update badge'
    required: false
    default: 'maintain'

  github-token:
    description: 'GitHub token for creating PRs (required for setup mode)'
    required: false
    default: ${{ github.token }}

  project-path:
    description: 'Path to the project directory'
    required: false
    default: '.'

  with-ai:
    description: 'DEPRECATED: use the Claude Code skill or MCP server for interactive population. This input is a no-op.'
    required: false
    default: 'false'

  ai-service:
    description: 'DEPRECATED: paired with the removed with-ai input. This input is a no-op.'
    required: false
    default: 'github-copilot'

  update-badge:
    description: 'Automatically update badge in README.md (maintain mode)'
    required: false
    default: 'true'

  strict:
    description: 'Fail the action on any schema violation in maintain mode (useful as a pre-merge gate).'
    required: false
    default: 'false'

  auto-migrate:
    description: 'If v1.x .ai/ shape is detected, open a PR with the v2.0 migration (maintain mode, default branch only).'
    required: false
    default: 'true'

  regenerate-index:
    description: 'Keep .ai/index.yaml in sync on every maintain run. Commits the regenerated file if it changed.'
    required: false
    default: 'true'

  install-shims:
    description: 'Comma-separated list of platform shims to scaffold in setup mode (cursor,copilot,windsurf,aider) or "all". Each shim points at AGENTS.md.'
    required: false
    default: ''

  generate-toon:
    description: 'Generate .toon files from .ai/ YAML sources (maintain mode)'
    required: false
    default: 'false'

  suggest-toon:
    description: 'Suggest TOON migration via GitHub issue with opt-in checkbox (maintain mode). Set to false to disable.'
    required: false
    default: 'true'

outputs:
  compliance-level:
    description: 'Compliance level: None, Minimal, Standard, Comprehensive'
    value: ${{ steps.check-compliance.outputs.level }}

  badge-url:
    description: 'Recommended badge URL'
    value: ${{ steps.check-compliance.outputs.badge }}

  pr-number:
    description: 'PR number if created (setup mode)'
    value: ${{ steps.create-pr.outputs.pr-number }}

  setup-needed:
    description: 'Whether .ai/ directory needs to be created'
    value: ${{ steps.check-existing.outputs.needs-setup }}

  migration-needed:
    description: 'True if v1.x .ai/ shape was detected'
    value: ${{ steps.check-migration.outputs.needed }}

  index-stale:
    description: 'True if .ai/index.yaml was regenerated during this run'
    value: ${{ steps.index-changes.outputs.changed }}

  schema-violations:
    description: 'Count of schema violations reported by validate.py (0 if clean)'
    value: ${{ steps.check-compliance.outputs.schema-violations }}

runs:
  using: 'composite'
  steps:
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install dependencies
      shell: bash
      env:
        GENERATE_TOON: ${{ inputs.generate-toon }}
        SUGGEST_TOON: ${{ inputs.suggest-toon }}
      run: |
        pip install pyyaml jsonschema
        if [ "$GENERATE_TOON" = "true" ] || [ "$SUGGEST_TOON" = "true" ]; then
          pip install git+https://github.com/toon-format/toon-python.git
        fi

    - name: Make scripts executable
      shell: bash
      run: |
        chmod +x ${{ github.action_path }}/scripts/bootstrap.py
        chmod +x ${{ github.action_path }}/scripts/validate.py
        chmod +x ${{ github.action_path }}/scripts/update_badge.py
        chmod +x ${{ github.action_path }}/scripts/generate_toon.py
        chmod +x ${{ github.action_path }}/scripts/toon_migration.py
        chmod +x ${{ github.action_path }}/scripts/migrate_v2.py
        chmod +x ${{ github.action_path }}/scripts/generate_index.py
        chmod +x ${{ github.action_path }}/scripts/install_shims.py

    - name: Check if .ai/ exists
      id: check-existing
      shell: bash
      env:
        PROJECT_PATH: ${{ inputs.project-path }}
      run: |
        if [ -d "$PROJECT_PATH/.ai" ]; then
          echo "needs-setup=false" >> $GITHUB_OUTPUT
          echo "✅ .ai/ directory exists"
        else
          echo "needs-setup=true" >> $GITHUB_OUTPUT
          echo "⚠️  .ai/ directory not found"
        fi

    # SETUP MODE - Bootstrap AICaC
    - name: Bootstrap AICaC structure
      if: inputs.mode == 'setup' && steps.check-existing.outputs.needs-setup == 'true'
      shell: bash
      env:
        PROJECT_PATH: ${{ inputs.project-path }}
      run: |
        cd "$PROJECT_PATH"
        python ${{ github.action_path }}/scripts/bootstrap.py .

    - name: Install platform shims
      if: >-
        inputs.mode == 'setup'
        && steps.check-existing.outputs.needs-setup == 'true'
        && inputs.install-shims != ''
      shell: bash
      env:
        PROJECT_PATH: ${{ inputs.project-path }}
        SHIMS: ${{ inputs.install-shims }}
      run: |
        cd "$PROJECT_PATH"
        python ${{ github.action_path }}/scripts/install_shims.py . --platforms="$SHIMS"

    - name: Generate PR body
      if: inputs.mode == 'setup' && steps.check-existing.outputs.needs-setup == 'true'
      id: pr-body
      shell: bash
      env:
        PROJECT_PATH: ${{ inputs.project-path }}
      run: |
        cd "$PROJECT_PATH"
        PR_BODY=$(python ${{ github.action_path }}/scripts/bootstrap.py . --pr-body)
        echo "pr-body<<EOF" >> $GITHUB_OUTPUT
        echo "$PR_BODY" >> $GITHUB_OUTPUT
        echo "EOF" >> $GITHUB_OUTPUT

    - name: Create Pull Request
      if: inputs.mode == 'setup' && steps.check-existing.outputs.needs-setup == 'true'
      id: create-pr
      uses: peter-evans/create-pull-request@v5
      with:
        token: ${{ inputs.github-token }}
        commit-message: 'chore: adopt AICaC standard for AI-readable documentation'
        title: '🤖 Adopt AICaC (AI Context as Code)'
        body: ${{ steps.pr-body.outputs.pr-body }}
        branch: aicac/bootstrap
        delete-branch: true
        labels: documentation, enhancement, aicac

    # MAINTAIN MODE - Detect v1.x shape (informs auto-migrate below)
    - name: Check for v1.x → v2.0 migration
      if: inputs.mode == 'maintain' || inputs.mode == 'validate'
      id: check-migration
      shell: bash
      env:
        PROJECT_PATH: ${{ inputs.project-path }}
      run: |
        cd "$PROJECT_PATH"
        if [ ! -d .ai ]; then
          echo "needed=false" >> $GITHUB_OUTPUT
          echo "ℹ️  No .ai/ directory — migration check skipped."
          exit 0
        fi
        if python ${{ github.action_path }}/scripts/migrate_v2.py . --check; then
          echo "needed=false" >> $GITHUB_OUTPUT
        else
          echo "needed=true" >> $GITHUB_OUTPUT
          echo "📋 v1.x .ai/ shape detected; migration available."
        fi

    # MAINTAIN MODE - Validate and update
    - name: Check AICaC compliance
      if: inputs.mode == 'maintain' || inputs.mode == 'validate'
      id: check-compliance
      shell: bash
      env:
        PROJECT_PATH: ${{ inputs.project-path }}
        STRICT: ${{ inputs.strict }}
      run: |
        cd "$PROJECT_PATH"

        # Run once in human-readable form for the log
        HUMAN_RC=0
        python ${{ github.action_path }}/scripts/validate.py . > validation_output.txt 2>&1 || HUMAN_RC=$?
        cat validation_output.txt

        if [ "$HUMAN_RC" -ne 0 ]; then
          echo "level=None" >> $GITHUB_OUTPUT
          echo "badge=https://img.shields.io/badge/AICaC-Not%20Adopted-red.svg" >> $GITHUB_OUTPUT
          echo "schema-violations=0" >> $GITHUB_OUTPUT
          echo "❌ AICaC not adopted"
          exit 1
        fi

        # Run again in JSON mode for structured counts
        python ${{ github.action_path }}/scripts/validate.py . --json > validation.json 2>/dev/null || true
        LEVEL=$(python -c "import json; print(json.load(open('validation.json')).get('compliance_level') or 'Unknown')")
        VIOLATIONS=$(python -c "import json; print(len(json.load(open('validation.json')).get('errors', [])))")
        echo "level=$LEVEL" >> $GITHUB_OUTPUT
        echo "schema-violations=$VIOLATIONS" >> $GITHUB_OUTPUT

        case "$LEVEL" in
          Comprehensive) echo "badge=https://img.shields.io/badge/AICaC-Comprehensive-success.svg" >> $GITHUB_OUTPUT ;;
          Standard)      echo "badge=https://img.shields.io/badge/AICaC-Standard-brightgreen.svg" >> $GITHUB_OUTPUT ;;
          Minimal)       echo "badge=https://img.shields.io/badge/AICaC-Minimal-green.svg" >> $GITHUB_OUTPUT ;;
          *)             echo "badge=https://img.shields.io/badge/AICaC-Unknown-lightgrey.svg" >> $GITHUB_OUTPUT ;;
        esac

        if [ "$STRICT" = "true" ] && [ "$VIOLATIONS" -gt 0 ]; then
          echo "❌ strict mode: $VIOLATIONS schema violation(s) found — failing"
          exit 1
        fi

    - name: Update badge in README
      if: (inputs.mode == 'maintain' && inputs.update-badge == 'true')
      shell: bash
      env:
        PROJECT_PATH: ${{ inputs.project-path }}
        LEVEL: ${{ steps.check-compliance.outputs.level }}
      run: |
        cd "$PROJECT_PATH"
        python ${{ github.action_path }}/scripts/update_badge.py "$LEVEL" --project-path=.

    - name: Check for badge changes
      if: inputs.mode == 'maintain' && inputs.update-badge == 'true'
      id: badge-changes
      shell: bash
      env:
        PROJECT_PATH: ${{ inputs.project-path }}
      run: |
        cd "$PROJECT_PATH"
        if git diff --quiet README.md; then
          echo "changed=false" >> $GITHUB_OUTPUT
          echo "✅ Badge already accurate"
        else
          echo "changed=true" >> $GITHUB_OUTPUT
          echo "📝 Badge updated in README.md"
        fi

    - name: Commit badge update
      if: inputs.mode == 'maintain' && inputs.update-badge == 'true' && steps.badge-changes.outputs.changed == 'true'
      uses: stefanzweifel/git-auto-commit-action@v5
      with:
        commit_message: 'docs: update AICaC badge to reflect ${{ steps.check-compliance.outputs.level }} compliance'
        file_pattern: README.md

    # INDEX REGENERATION - Keep .ai/index.yaml in sync
    - name: Regenerate .ai/index.yaml
      if: >-
        inputs.mode == 'maintain'
        && inputs.regenerate-index == 'true'
        && steps.check-existing.outputs.needs-setup == 'false'
      shell: bash
      env:
        PROJECT_PATH: ${{ inputs.project-path }}
      run: |
        cd "$PROJECT_PATH"
        python ${{ github.action_path }}/scripts/generate_index.py .

    - name: Check for index changes
      if: >-
        inputs.mode == 'maintain'
        && inputs.regenerate-index == 'true'
        && steps.check-existing.outputs.needs-setup == 'false'
      id: index-changes
      shell: bash
      env:
        PROJECT_PATH: ${{ inputs.project-path }}
      run: |
        cd "$PROJECT_PATH"
        if git diff --quiet .ai/index.yaml 2>/dev/null \
           && ! git ls-files --others --exclude-standard .ai/index.yaml | grep -q .; then
          echo "changed=false" >> $GITHUB_OUTPUT
          echo "✅ .ai/index.yaml already in sync"
        else
          echo "changed=true" >> $GITHUB_OUTPUT
          echo "📝 .ai/index.yaml regenerated"
        fi

    - name: Commit index update
      if: >-
        inputs.mode == 'maintain'
        && inputs.regenerate-index == 'true'
        && steps.index-changes.outputs.changed == 'true'
      uses: stefanzweifel/git-auto-commit-action@v5
      with:
        commit_message: 'chore(ai): regenerate .ai/index.yaml'
        file_pattern: '.ai/index.yaml'

    # AUTO-MIGRATE - v1.x → v2.0 PR (default branch only)
    - name: Check default branch for auto-migrate
      if: >-
        inputs.mode == 'maintain'
        && inputs.auto-migrate == 'true'
        && steps.check-migration.outputs.needed == 'true'
      id: migrate-default-branch
      shell: bash
      run: |
        DEFAULT_BRANCH=$(git remote show origin | sed -n 's/.*HEAD branch: //p')
        CURRENT_REF="${GITHUB_REF#refs/heads/}"
        if [ "$CURRENT_REF" = "$DEFAULT_BRANCH" ]; then
          echo "is-default=true" >> "$GITHUB_OUTPUT"
        else
          echo "is-default=false" >> "$GITHUB_OUTPUT"
          echo "⏭️  Skipping v2 auto-migrate (not on default branch: $CURRENT_REF)"
        fi

    - name: Run v2.0 migration
      if: >-
        inputs.mode == 'maintain'
        && inputs.auto-migrate == 'true'
        && steps.check-migration.outputs.needed == 'true'
        && steps.migrate-default-branch.outputs.is-default == 'true'
      shell: bash
      env:
        PROJECT_PATH: ${{ inputs.project-path }}
      run: |
        cd "$PROJECT_PATH"
        python ${{ github.action_path }}/scripts/migrate_v2.py .
        # Regenerate index against the migrated files
        python ${{ github.action_path }}/scripts/generate_index.py .

    - name: Open v2.0 migration PR
      if: >-
        inputs.mode == 'maintain'
        && inputs.auto-migrate == 'true'
        && steps.check-migration.outputs.needed == 'true'
        && steps.migrate-default-branch.outputs.is-default == 'true'
      uses: peter-evans/create-pull-request@v5
      with:
        token: ${{ inputs.github-token }}
        commit-message: 'refactor(ai): migrate .ai/ to v2.0 canonical shape'
        title: 'refactor(ai): migrate .ai/ to v2.0 canonical shape'
        body: |
          Automated migration from AICaC v1.x to v2.0 canonical shape.

          Changes applied by `migrate_v2.py`:
          - `components:` list → dict keyed by component name
          - `decisions:` list → dict keyed by ADR id
          - `errors:`/`error_patterns:` list → dict keyed by error id
          - `common_commands:` → `common_tasks:`
          - `version:` bumped `1.x` → `2.0`
          - `.ai/index.yaml` regenerated against the migrated files

          Review the diff, then merge to complete the migration. The
          validator will continue to accept v1.x shape with warnings until
          this PR lands.
        branch: aicac/migrate-v2
        delete-branch: true
        labels: aicac, migration

    # TOON GENERATION - Generate .toon files from .ai/ YAML sources
    - name: Generate TOON files
      if: inputs.mode == 'maintain' && inputs.generate-toon == 'true'
      id: generate-toon
      shell: bash
      env:
        PROJECT_PATH: ${{ inputs.project-path }}
      run: |
        cd "$PROJECT_PATH"
        python ${{ github.action_path }}/scripts/generate_toon.py .

    - name: Check for TOON changes
      if: inputs.mode == 'maintain' && inputs.generate-toon == 'true'
      id: toon-changes
      shell: bash
      env:
        PROJECT_PATH: ${{ inputs.project-path }}
      run: |
        cd "$PROJECT_PATH"
        if git diff --quiet .ai/*.toon 2>/dev/null && ! git ls-files --others --exclude-standard .ai/*.toon | grep -q .; then
          echo "changed=false" >> $GITHUB_OUTPUT
          echo "✅ TOON files already up to date"
        else
          echo "changed=true" >> $GITHUB_OUTPUT
          echo "📝 TOON files updated"
        fi

    - name: Commit TOON files
      if: inputs.mode == 'maintain' && inputs.generate-toon == 'true' && steps.toon-changes.outputs.changed == 'true'
      uses: stefanzweifel/git-auto-commit-action@v5
      with:
        commit_message: 'chore: regenerate .ai/ TOON files from YAML sources'
        file_pattern: '.ai/*.toon'

    # TOON MIGRATION - Issue-based opt-in workflow (default branch only)
    - name: Check if on default branch
      if: inputs.mode == 'maintain' && inputs.suggest-toon == 'true'
      id: default-branch
      shell: bash
      run: |
        DEFAULT_BRANCH=$(git remote show origin | sed -n 's/.*HEAD branch: //p')
        CURRENT_REF="${GITHUB_REF#refs/heads/}"
        if [ "$CURRENT_REF" = "$DEFAULT_BRANCH" ]; then
          echo "is-default=true" >> "$GITHUB_OUTPUT"
          echo "✅ On default branch ($DEFAULT_BRANCH)"
        else
          echo "is-default=false" >> "$GITHUB_OUTPUT"
          echo "⏭️  Skipping TOON migration (not on default branch: $CURRENT_REF)"
        fi

    - name: Check if TOON migration needed
      if: >-
        inputs.mode == 'maintain' && inputs.suggest-toon == 'true'
        && steps.default-branch.outputs.is-default == 'true'
      id: migration-needed
      shell: bash
      env:
        PROJECT_PATH: ${{ inputs.project-path }}
      run: |
        cd "$PROJECT_PATH"
        if python ${{ github.action_path }}/scripts/toon_migration.py . --needs-migration; then
          echo "needed=true" >> $GITHUB_OUTPUT
          echo "📋 Project eligible for TOON migration"
        else
          echo "needed=false" >> $GITHUB_OUTPUT
          echo "✅ TOON migration not needed (already migrated or no .ai/)"
        fi

    - name: Check for existing migration issue
      if: >-
        inputs.mode == 'maintain' && inputs.suggest-toon == 'true'
        && steps.default-branch.outputs.is-default == 'true'
        && steps.migration-needed.outputs.needed == 'true'
      id: migration-issue
      shell: bash
      env:
        GH_TOKEN: ${{ inputs.github-token }}
      run: |
        # Search for open migration issue
        OPEN_ISSUE=$(gh issue list --label "aicac-toon-migration" --state open --json number,body --jq '.[0]' 2>/dev/null || echo "")
        if [ -n "$OPEN_ISSUE" ] && [ "$OPEN_ISSUE" != "null" ]; then
          ISSUE_NUMBER=$(echo "$OPEN_ISSUE" | jq -r '.number')
          ISSUE_BODY=$(echo "$OPEN_ISSUE" | jq -r '.body')
          echo "state=open" >> $GITHUB_OUTPUT
          echo "number=$ISSUE_NUMBER" >> $GITHUB_OUTPUT
          # Write body to file to avoid shell escaping issues
          echo "$ISSUE_BODY" > /tmp/migration_issue_body.txt
          echo "📋 Found open migration issue #$ISSUE_NUMBER"
        else
          # Check for closed issue (user declined)
          CLOSED_ISSUE=$(gh issue list --label "aicac-toon-migration" --state closed --json number --jq '.[0].number' 2>/dev/null || echo "")
          if [ -n "$CLOSED_ISSUE" ] && [ "$CLOSED_ISSUE" != "null" ]; then
            echo "state=declined" >> $GITHUB_OUTPUT
            echo "number=$CLOSED_ISSUE" >> $GITHUB_OUTPUT
            echo "🚫 Migration previously declined (issue #$CLOSED_ISSUE closed)"
          else
            echo "state=none" >> $GITHUB_OUTPUT
            echo "number=" >> $GITHUB_OUTPUT
            echo "📝 No existing migration issue found"
          fi
        fi

    - name: Ensure migration label exists
      if: >-
        inputs.mode == 'maintain' && inputs.suggest-toon == 'true'
        && steps.default-branch.outputs.is-default == 'true'
        && steps.migration-needed.outputs.needed == 'true'
        && steps.migration-issue.outputs.state == 'none'
      shell: bash
      env:
        GH_TOKEN: ${{ inputs.github-token }}
      run: |
        gh label create "aicac-toon-migration" \
          --description "AICaC TOON migration tracking" \
          --color "0075ca" 2>/dev/null || true

    - name: Create migration issue
      if: >-
        inputs.mode == 'maintain' && inputs.suggest-toon == 'true'
        && steps.default-branch.outputs.is-default == 'true'
        && steps.migration-needed.outputs.needed == 'true'
        && steps.migration-issue.outputs.state == 'none'
      shell: bash
      env:
        GH_TOKEN: ${{ inputs.github-token }}
        PROJECT_PATH: ${{ inputs.project-path }}
      run: |
        cd "$PROJECT_PATH"
        ISSUE_BODY=$(python ${{ github.action_path }}/scripts/toon_migration.py . --issue-body)
        gh issue create \
          --title "Migrate .ai/ to include TOON for efficient AI context" \
          --body "$ISSUE_BODY" \
          --label "aicac-toon-migration"
        echo "✅ Created TOON migration issue"

    - name: Check migration approval
      if: >-
        inputs.mode == 'maintain' && inputs.suggest-toon == 'true'
        && steps.default-branch.outputs.is-default == 'true'
        && steps.migration-needed.outputs.needed == 'true'
        && steps.migration-issue.outputs.state == 'open'
      id: migration-approved
      shell: bash
      env:
        PROJECT_PATH: ${{ inputs.project-path }}
      run: |
        cd "$PROJECT_PATH"
        ISSUE_BODY=$(cat /tmp/migration_issue_body.txt)
        if python ${{ github.action_path }}/scripts/toon_migration.py . --check-approval "$ISSUE_BODY"; then
          echo "approved=true" >> $GITHUB_OUTPUT
          echo "✅ Migration approved by checkbox"
        else
          echo "approved=false" >> $GITHUB_OUTPUT
          echo "⏳ Migration checkbox not yet checked"
        fi

    - name: Generate TOON files for migration PR
      if: >-
        inputs.mode == 'maintain' && inputs.suggest-toon == 'true'
        && steps.default-branch.outputs.is-default == 'true'
        && steps.migration-approved.outputs.approved == 'true'
      shell: bash
      env:
        PROJECT_PATH: ${{ inputs.project-path }}
      run: |
        cd "$PROJECT_PATH"
        python ${{ github.action_path }}/scripts/generate_toon.py .

    - name: Create migration PR
      if: >-
        inputs.mode == 'maintain' && inputs.suggest-toon == 'true'
        && steps.default-branch.outputs.is-default == 'true'
        && steps.migration-approved.outputs.approved == 'true'
      shell: bash
      env:
        GH_TOKEN: ${{ inputs.github-token }}
        PROJECT_PATH: ${{ inputs.project-path }}
        ISSUE_NUMBER: ${{ steps.migration-issue.outputs.number }}
      run: |
        cd "$PROJECT_PATH"
        SCRIPT="${{ github.action_path }}/scripts/toon_migration.py"

        # Configure git identity for commit
        git config user.name "github-actions[bot]"
        git config user.email "github-actions[bot]@users.noreply.github.com"

        BRANCH="aicac/toon-migration"

        # Check if migration PR already exists
        EXISTING_PR=$(gh pr list --head "$BRANCH" --json number --jq '.[0].number' 2>/dev/null || echo "")
        if [ -n "$EXISTING_PR" ] && [ "$EXISTING_PR" != "null" ]; then
          # PR exists — check if rebase/regenerate was requested
          gh pr view "$EXISTING_PR" --json body --jq '.body' > /tmp/migration_pr_body.txt
          PR_BODY=$(cat /tmp/migration_pr_body.txt)

          if python "$SCRIPT" . --check-rebase "$PR_BODY"; then
            echo "🔄 Rebase requested for migration PR #$EXISTING_PR"

            # Attempt to regenerate and force-push
            if git checkout -B "$BRANCH" && \
               git add .ai/*.toon && \
               git commit -m "feat: regenerate TOON files from updated YAML sources" && \
               git push origin "$BRANCH" --force; then
              # Success — uncheck the rebase checkbox
              python "$SCRIPT" . --uncheck-rebase < /tmp/migration_pr_body.txt > /tmp/updated_pr_body.txt
              gh pr edit "$EXISTING_PR" --body-file /tmp/updated_pr_body.txt
              echo "✅ Rebased migration PR #$EXISTING_PR"
            else
              # Failed — update PR with failure notice
              ERR="Regeneration failed during the last action run. Check the workflow logs for details."
              python "$SCRIPT" . --rebase-failed "$ERR" < /tmp/migration_pr_body.txt > /tmp/updated_pr_body.txt
              gh pr edit "$EXISTING_PR" --body-file /tmp/updated_pr_body.txt
              echo "❌ Rebase failed for migration PR #$EXISTING_PR"
            fi
          else
            echo "✅ Migration PR #$EXISTING_PR already exists (no rebase requested)"
          fi
          exit 0
        fi

        # No existing PR — create a new one
        git checkout -b "$BRANCH"
        git add .ai/*.toon
        git commit -m "feat: add TOON-encoded .ai/ files for efficient AI context"

        # Push (force if stale remote branch exists, plain push otherwise)
        git push origin "$BRANCH" 2>/dev/null || git push origin "$BRANCH" --force

        # Generate PR body and create PR
        PR_BODY=$(python "$SCRIPT" . --pr-body "$ISSUE_NUMBER")
        gh pr create \
          --title "Add TOON-encoded .ai/ files" \
          --body "$PR_BODY" \
          --head "$BRANCH" \
          --label "aicac-toon-migration"
        echo "✅ Created TOON migration PR (closes #$ISSUE_NUMBER)"
