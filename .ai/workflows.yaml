version: '2.0'
summary: Common tasks for AICaC contributors — run token measurements, adopt AICaC in another project, update badges, generate TOON/index, contribute to the spec.
workflows:
  run_token_measurement:
    description: Measure token consumption across README / AGENTS / AICaC formats (deterministic, free).
    steps:
      - action: install_dependencies
        command: pip install -r validation/requirements.txt
      - action: prepare_variants
        command: make prepare
      - action: measure
        command: make measure-all
    prerequisites:
      - Python 3.8+
    reference: validation/README.md
    touches_components: [validation_framework]
  run_performance_experiment:
    description: Measure AI response quality and latency across formats (uses AI APIs, may cost money).
    steps:
      - action: install_dependencies
        command: pip install -r validation/requirements.txt
      - action: estimate_cost
        command: make perf-estimate
      - action: run_with_provider
        command: "make perf-ollama  # or perf-groq (free) / perf-claude / perf-openai"
    prerequisites:
      - Provider credentials (API key or local Ollama)
    reference: validation/docs/testing-framework.md
    touches_components: [validation_framework]
  run_tests:
    description: Run pytest suite for the adoption action.
    command: cd .github/actions/aicac-adoption && pytest
    prerequisites:
      - pip install pytest pytest-cov pyyaml jsonschema
    reference: .github/actions/aicac-adoption/TESTING.md
    touches_components: [adoption_action]
  adopt_aicac:
    description: Add AICaC to an external project.
    steps:
      - action: bootstrap
        command: python .github/actions/aicac-adoption/scripts/bootstrap.py /path/to/project
      - action: customize
        file: .ai/context.yaml
        note: Fill in project-specific values, remove TODO markers.
      - action: validate
        command: python .github/actions/aicac-adoption/scripts/validate.py /path/to/project
      - action: add_badge
        file: README.md
        note: Paste badge from validator output.
      - action: commit
        command: 'git add .ai/ README.md && git commit -m "chore: adopt AICaC"'
    reference: README.md
    touches_components: [adoption_action]
  validate_compliance:
    description: Check a project meets AICaC v2.0 schema, cross-references, and quality heuristics.
    command: python .github/actions/aicac-adoption/scripts/validate.py .
    touches_components: [adoption_action]
  update_badge:
    description: Recompute and write compliance badge in README.md.
    command: python .github/actions/aicac-adoption/scripts/update_badge.py <LEVEL> --project-path=.
    touches_components: [badging_system, adoption_action]
  generate_index:
    description: Regenerate the optional .ai/index.yaml routing file.
    command: python .github/actions/aicac-adoption/scripts/generate_index.py .
    touches_components: [adoption_action]
  generate_toon:
    description: Regenerate optional TOON-encoded .ai/*.toon files for token-efficient loading.
    command: python .github/actions/aicac-adoption/scripts/generate_toon.py .
    touches_components: [adoption_action]
  contribute_to_spec:
    description: Propose a change to AICaC schemas or conventions.
    steps:
      - action: fork_repo
        command: gh repo fork eFAILution/AICaC
      - action: branch
        command: git checkout -b feat/my-change
      - action: change_schema
        location: spec/v2/
        note: Update schema + whitepaper + at least one example (sample project or this repo's .ai/).
      - action: run_tests
        command: cd .github/actions/aicac-adoption && pytest
      - action: open_pr
        command: gh pr create
    touches_components: [specification]
common_issues:
  schema_validation_failed:
    symptom: jsonschema.ValidationError when running validate.py
    solution: Read the path in the error; consult spec/v2/*.schema.json for required shape.
  api_key_missing:
    symptom: Anthropic API key not found
    solution: "export ANTHROPIC_API_KEY=... (or use perf-ollama / perf-groq for free alternatives)"
  pytest_import_error:
    symptom: ModuleNotFoundError when running pytest
    solution: Run from repo root; pytest.ini configures pythonpath.
