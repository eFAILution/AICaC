version: '2.0'
summary: Errors encountered while authoring or validating .ai/ — YAML syntax, schema violations, deprecated v1.x shapes, missing dependencies, badge drift.
errors:
  YAML_PARSE_ERROR:
    symptom: yaml.scanner.ScannerError or similar when loading .ai/ files
    common_causes:
      - Incorrect indentation (YAML is whitespace-sensitive)
      - Missing quotes around special characters
      - Tab characters instead of spaces
      - Unclosed quotes or brackets
    solutions:
      - "Use YAML linter: pip install yamllint && yamllint .ai/"
      - Check indentation is consistent (2 spaces recommended)
      - "Validate with: python -c \"import yaml; yaml.safe_load(open('.ai/context.yaml'))\""
      - "Use online validator: https://www.yamllint.com/"
  SCHEMA_VALIDATION_ERROR:
    symptom: "jsonschema.ValidationError: ... failed validating '...' in schema"
    common_causes:
      - Required field missing (e.g. project.description)
      - Wrong type (string vs list)
      - project.type not in enum (use 'other' + type_detail for exotic cases)
      - v1.x list form encountered — migrate to v2.0 dict form
    solutions:
      - "Run: python .github/actions/aicac-adoption/scripts/validate.py ."
      - Consult spec/v2/*.schema.json for the required shape
      - "If migrating v1.x: python .github/actions/aicac-adoption/scripts/migrate_v2.py ."
    reference: spec/README.md
  DEPRECATED_V1_LIST_FORM:
    symptom: "DEPRECATION: architecture.yaml uses list form for components; v2.0 prefers dict keyed by component id"
    common_causes:
      - File was authored against v1.x whitepaper examples
      - components / decisions / error_patterns given as YAML list
    solutions:
      - Convert list entries keyed by 'name' / 'id' / 'pattern' into a dict keyed by that value
      - "Automated: python .github/actions/aicac-adoption/scripts/migrate_v2.py ."
    reference: spec/README.md#migration-from-v1x--v20
  COMMON_COMMANDS_DEPRECATED:
    symptom: "DEPRECATION: context.yaml uses 'common_commands'; v2.0 prefers 'common_tasks'"
    common_causes:
      - File was authored against an old example
    solutions:
      - Rename the key to common_tasks in context.yaml
  XREF_UNKNOWN_COMPONENT:
    symptom: "XREF: workflow 'X' references component 'Y' which is not defined in architecture.yaml"
    common_causes:
      - Component id typo in touches_components / affects_components / depends_on
      - Component removed from architecture.yaml without updating references
    solutions:
      - Fix the typo, or add the missing component to architecture.yaml
      - If component was intentionally removed, remove the reference
  MODULE_NOT_FOUND_PYYAML:
    symptom: 'ModuleNotFoundError: No module named "yaml"'
    common_causes:
      - PyYAML not installed
      - Wrong Python environment active
    solutions:
      - "Install PyYAML: pip install pyyaml"
      - Check virtual environment is activated
    reference: .github/actions/aicac-adoption/action.yml
  MODULE_NOT_FOUND_JSONSCHEMA:
    symptom: 'ModuleNotFoundError: No module named "jsonschema"'
    common_causes:
      - jsonschema not installed (v2.0 validator requirement)
    solutions:
      - "pip install jsonschema"
  API_KEY_MISSING:
    symptom: anthropic.APIKeyError or environment variable not found
    common_causes:
      - ANTHROPIC_API_KEY not set in environment
      - API key expired or invalid
    solutions:
      - "export ANTHROPIC_API_KEY=your_key"
      - "Use a free provider instead: make perf-ollama or make perf-groq"
    reference: validation/docs/quick-start.md
  GITHUB_ACTION_PERMISSION_ERROR:
    symptom: GitHub Actions is not permitted to create or approve pull requests
    common_causes:
      - Repository workflow permissions not configured
      - GITHUB_TOKEN lacks required scopes
    solutions:
      - "Settings > Actions > General > Workflow permissions > enable 'Allow GitHub Actions to create and approve pull requests'"
      - "Ensure workflow has permissions.pull-requests: write and issues: write"
    reference: .github/workflows/validate-aicac.yml
  PYTEST_COVERAGE_BELOW_THRESHOLD:
    symptom: "FAILED: coverage below 80% threshold"
    common_causes:
      - New code added without tests
      - Edge cases not covered
    solutions:
      - "Run: pytest --cov=scripts --cov-report=html"
      - Open htmlcov/index.html to see missed lines
    reference: .github/actions/aicac-adoption/tests/
  BADGE_NOT_UPDATING:
    symptom: AICaC badge in README.md not updating automatically
    common_causes:
      - Workflow not triggered on .ai/ changes
      - update-badge input set to false
      - README.md not found
    solutions:
      - Check workflow triggers in .github/workflows/validate-aicac.yml
      - "Ensure update-badge: true in action inputs"
      - "Manual: python .github/actions/aicac-adoption/scripts/update_badge.py <LEVEL>"
  WRONG_COMPLIANCE_LEVEL:
    symptom: Badge shows lower compliance level than expected
    common_causes:
      - Optional files not detected (wrong filename, wrong location)
      - Files fail schema or cross-reference validation
      - Content-quality heuristic rejected TODO-only file
    solutions:
      - "Run validator: python .github/actions/aicac-adoption/scripts/validate.py ."
      - Check validator output for which file is failing and why
      - Ensure optional files have real content (not just TODO entries)
troubleshooting_workflow:
  - step: Read the full error message
    action: Note exact path, line, and rule name
  - step: Search this file
    action: Match symptom to an entry in .ai/errors.yaml
  - step: Run validator
    action: "python .github/actions/aicac-adoption/scripts/validate.py ."
  - step: Check GitHub Issues
    action: "https://github.com/eFAILution/AICaC/issues"
  - step: Ask for help
    action: Open a new issue with error message, steps to reproduce, and environment details
support:
  github_issues: https://github.com/eFAILution/AICaC/issues
  discussions: https://github.com/eFAILution/AICaC/discussions
