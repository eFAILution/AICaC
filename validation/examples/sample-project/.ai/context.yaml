version: '2.0'
summary: TaskFlow — Python 3.11 + FastAPI REST API for task management, SQLite by default.
project:
  name: taskflow
  type: rest-api
  description: Task management REST API built on FastAPI with Pydantic validation and a service-layer architecture.
  primary_language: python
  languages:
    - python
repository:
  default_branch: main
entrypoints:
  api: src/taskflow/main.py
  cli: src/taskflow/cli.py
context_modules:
  architecture: architecture.yaml
  workflows: workflows.yaml
  decisions: decisions.yaml
  errors: errors.yaml
common_tasks:
  dev: taskflow serve --reload
  test: pytest
  format: black src/ tests/
constraints:
  - All endpoints require type hints
  - Use Pydantic models for request/response
  - Business logic belongs in services/, not api/
