version: '2.0'
summary: Four-layer architecture — api (HTTP) → services (business logic) → db (SQLAlchemy) with models (Pydantic) used across layers.
components:
  api:
    location: src/taskflow/api/
    purpose: HTTP route handlers (FastAPI routers).
    files:
      - tasks.py: Task CRUD endpoints
      - projects.py: Project endpoints
    depends_on:
      - services
      - models
  models:
    location: src/taskflow/models/
    purpose: Pydantic models for request/response validation.
    files:
      - task.py: Task, TaskCreate, TaskUpdate
      - project.py: Project, ProjectCreate
  services:
    location: src/taskflow/services/
    purpose: Business logic layer, reusable across endpoints.
    files:
      - task_service.py: Task operations
    depends_on:
      - db
      - models
  db:
    location: src/taskflow/db/
    purpose: Database connection and queries (SQLAlchemy).
    files:
      - database.py: SQLAlchemy setup
interfaces:
  Task:
    location: src/taskflow/models/task.py
    attributes:
      - id: int
      - title: str
      - description: str | None
      - priority: Priority enum
      - status: Status enum
      - due_date: datetime | None
      - project_id: int | None
data_flow:
  create_task:
    - step: 1
      component: api
      action: Receive POST /tasks
    - step: 2
      component: models
      action: Validate with TaskCreate
    - step: 3
      component: services
      action: Create task in database
    - step: 4
      component: api
      action: Return Task response
extension_points:
  - name: New endpoint
    location: src/taskflow/api/
    registration: src/taskflow/main.py
  - name: New model
    location: src/taskflow/models/
